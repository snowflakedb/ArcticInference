name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: ruff check arctic_inference/

      - name: Run Ruff formatter check
        run: ruff format --check arctic_inference/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy torch numpy

      - name: Run mypy
        run: mypy arctic_inference/ --ignore-missing-imports --no-error-summary || true
        # Note: Running with || true initially as codebase needs gradual type coverage improvement

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio torch numpy

      - name: Run unit tests
        run: |
          # Run only unit tests that don't require GPU
          pytest tests/unit_tests/ -v --ignore=tests/unit_tests/test_custom_ops.py --ignore=tests/unit_tests/test_reshape_and_cache_flash_nvfp4.py || true
        # Note: Some tests require GPU, running with || true for CI on CPU runners

  license-check:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check license headers
        run: python scripts/check_license.py
